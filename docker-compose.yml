services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "8081:80"

  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"

  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: